name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - name: Verify signing key
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set (${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          else
            echo "❌ TAURI_SIGNING_PRIVATE_KEY is NOT set"
            exit 1
          fi
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set"
          else
            echo "⚠️  TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and release (macOS universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: AI PM ${{ github.ref_name }}
          releaseBody: '请查看 CHANGELOG 了解此版本变更。'
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
          includeUpdaterJson: true

      - name: Sign and upload updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          TAG="${{ github.ref_name }}"
          find app/src-tauri/target/release/bundle -type f 2>/dev/null | head -30
          BUNDLE=$(find "$PWD/app/src-tauri/target" -name "*.app.tar.gz" -not -name "*.sig" | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "❌ No .app.tar.gz found"; exit 1
          fi
          echo "Signing: $BUNDLE"
          cd app && npx tauri signer sign "$BUNDLE" --ci
          gh release upload "$TAG" "${BUNDLE}.sig" --clobber

  build-windows:
    needs: [build-macos]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - name: Verify signing key
        shell: bash
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set (${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          else
            echo "❌ TAURI_SIGNING_PRIVATE_KEY is NOT set"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and release (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: AI PM ${{ github.ref_name }}
          releaseBody: '请查看 CHANGELOG 了解此版本变更。'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Sign and upload updater bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          TAG="${{ github.ref_name }}"
          find app/src-tauri/target/release/bundle -type f 2>/dev/null | head -30
          BUNDLE=$(find "$PWD/app/src-tauri/target" -name "*.nsis.zip" -not -name "*.sig" | head -1)
          if [ -z "$BUNDLE" ]; then
            BUNDLE=$(find "$PWD/app/src-tauri/target" -name "*.msi.zip" -not -name "*.sig" | head -1)
          fi
          if [ -n "$BUNDLE" ]; then
            echo "Signing: $BUNDLE"
            cd app && npx tauri signer sign "$BUNDLE" --ci
            gh release upload "$TAG" "$BUNDLE" "${BUNDLE}.sig" --clobber
          else
            echo "⚠️  No Windows updater bundle found"
            find app/src-tauri/target -type f \( -name "*.msi*" -o -name "*.nsis*" -o -name "*.exe" \) 2>/dev/null
          fi

  update-manifest:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate and deploy latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p /tmp/deploy /tmp/sigs

          # Download .sig files (non-fatal if missing)
          gh release download "$TAG" --pattern "*.sig" --dir /tmp/sigs 2>/dev/null || true

          # Read signatures (empty string if not found)
          SIG_MAC=$(cat /tmp/sigs/*app.tar.gz.sig 2>/dev/null || echo "")
          SIG_WIN=$(cat /tmp/sigs/*msi.zip.sig 2>/dev/null || echo "")

          # Determine macOS updater asset name
          MAC_ASSET=$(gh release view "$TAG" --json assets -q '.assets[].name' | grep '\.app\.tar\.gz$' | head -1)
          WIN_ASSET=$(gh release view "$TAG" --json assets -q '.assets[].name' | grep '\.msi\.zip$' | head -1)

          # Fallback asset names
          MAC_ASSET="${MAC_ASSET:-AI.PM_universal.app.tar.gz}"
          WIN_ASSET="${WIN_ASSET:-AI.PM_${VERSION}_x64_en-US.msi.zip}"

          cat > /tmp/deploy/latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "更新至 ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_MAC}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${MAC_ASSET}"
              },
              "darwin-x86_64": {
                "signature": "${SIG_MAC}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${MAC_ASSET}"
              },
              "windows-x86_64": {
                "signature": "${SIG_WIN}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${WIN_ASSET}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat /tmp/deploy/latest.json

          if [ -z "$SIG_MAC" ] && [ -z "$SIG_WIN" ]; then
            echo "⚠️  No signatures found. Auto-updater will not work until signing is configured."
          fi

      - name: Deploy latest.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
