<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PM · 使用教程</title>
<style>
:root {
  --accent: #1D4ED8;
  --accent-hover: #1E40AF;
  --accent-light: rgba(29,78,216,0.08);
  --accent-ring: rgba(29,78,216,0.25);

  --background: #F8FAFF;
  --bg-elevated: rgba(234,241,252,0.90);
  --secondary: #EEF2FB;
  --card: #FFFFFF;

  --text-primary: #0F172A;
  --text-secondary: #64748B;
  --text-tertiary: #94A3B8;

  --success: #16A34A;
  --warning: #F59E0B;
  --border: rgba(0,0,0,0.08);
  --hover-bg: rgba(0,0,0,0.04);
  --active-bg: rgba(0,0,0,0.07);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);

  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-decelerate: cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 100ms;
  --dur-base: 200ms;
  --dur-slow: 300ms;

  --radius-sm: 6px;
  --radius: 8px;
  --radius-lg: 12px;

  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

html.theme-dark {
  --accent: #4F8EF7;
  --accent-hover: #3B7AE0;
  --accent-light: rgba(79,142,247,0.10);
  --background: oklch(12% 0.02 250);
  --bg-elevated: oklch(14% 0.025 250);
  --secondary: oklch(18% 0.03 250);
  --card: oklch(16% 0.025 250);
  --text-primary: #E2E8F0;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --border: rgba(255,255,255,0.07);
  --hover-bg: rgba(255,255,255,0.05);
  --active-bg: rgba(255,255,255,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; transition: background-color 200ms ease, color 200ms ease; }
body {
  font-family: var(--font-sans);
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes staggerFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInLeft {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29,78,216,0.5); }
  50%      { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(29,78,216,0); }
}
@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
