<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI_PM - AI 产品经理</title>
    <meta name="description" content="AI_PM 是一套 AI 辅助产品管理工具集，将简短需求转化为完整的产品方案">

    <!-- Apple-style Meta -->
    <meta name="theme-color" content="#ffffff">

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Marked.js -->
    <script src="https://unpkg.com/marked@9/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11/styles/github.min.css">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11/highlight.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11/languages/bash.min.js"></script>

    <style>
        /* ========== Apple Design System ========== */
        :root {
            /* Apple Color Palette */
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-indigo: #5856d6;
            --apple-purple: #af52de;
            --apple-pink: #ff2d55;
            --apple-red: #ff3b30;
            --apple-orange: #ff9500;
            --apple-yellow: #ffcc00;
            --apple-green: #34c759;
            --apple-teal: #5ac8fa;
            --apple-cyan: #32ade6;

            /* Grays - Apple Style */
            --gray-01: #f5f5f7;
            --gray-02: #e8e8ed;
            --gray-03: #d2d2d7;
            --gray-04: #86868b;
            --gray-05: #6e6e73;

            /* Light Mode (Default) */
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #fafafa;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #6e6e73;
            --border-color: rgba(0,0,0,0.1);

            /* Typography - Apple Style */
            --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', SFMono-Regular, 'Courier New', monospace;

            /* Spacing - 8pt Grid */
            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --space-3xl: 64px;

            /* Layout */
            --nav-height: 52px;
            --max-width: 1200px;
            --content-width: 800px;

            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 28px;
            --radius-full: 9999px;

            /* Shadows - Apple Style */
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 28px rgba(0,0,0,0.12);
            --shadow-xl: 0 12px 40px rgba(0,0,0,0.16);

            /* Transitions */
            --duration-fast: 150ms;
            --duration-normal: 300ms;
            --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== Navigation ========== */
        .nav-global {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(255,255,255,0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 9999;
            transition: background var(--duration-fast);
        }

        .nav-content {
            max-width: var(--max-width);
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-lg);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .nav-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            transition: all var(--duration-fast);
            opacity: 0.8;
        }

        .nav-link:hover {
            opacity: 1;
            background: rgba(0,0,0,0.04);
        }

        .nav-link.active {
            opacity: 1;
            font-weight: 500;
        }

        .nav-cta {
            background: var(--apple-blue);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            transition: all var(--duration-fast);
        }

        .nav-cta:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.02);
        }

        /* ========== Typography ========== */
        .typo-hero {
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -0.015em;
            line-height: 1.05;
        }

        .typo-headline {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.003em;
            line-height: 1.1;
        }

        .typo-eyebrow {
            font-size: 21px;
            font-weight: 600;
            color: var(--apple-blue);
            letter-spacing: 0.011em;
            margin-bottom: var(--space-sm);
        }

        .typo-intro {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 0.007em;
        }

        .typo-body {
            font-size: 19px;
            line-height: 1.5;
            letter-spacing: 0.011em;
        }

        /* ========== Hero Section ========== */
        .section-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--nav-height) + var(--space-3xl)) var(--space-lg) var(--space-3xl);
            position: relative;
            overflow: hidden;
        }

        .hero-bg-shapes {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            top: -200px;
            right: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--apple-pink), var(--apple-orange));
            bottom: -100px;
            left: -100px;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--apple-green), var(--apple-teal));
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
            position: relative;
            z-index: 1;
        }

        .hero-title {
            margin-bottom: var(--space-md);
            background: linear-gradient(135deg, var(--text-primary), var(--gray-05));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-description {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto var(--space-xl);
        }

        .hero-cta-group {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            background: var(--apple-blue);
            color: white;
            padding: 16px 32px;
            border-radius: var(--radius-full);
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            transition: all var(--duration-fast);
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 16px 32px;
            border-radius: var(--radius-full);
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            transition: all var(--duration-fast);
            border: none;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: var(--gray-02);
        }

        /* ========== Version Badge ========== */
        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
            color: white;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: var(--space-lg);
        }

        .version-badge-small {
            background: rgba(0,113,227,0.1);
            color: var(--apple-blue);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        /* ========== Section Styles ========== */
        .section {
            padding: var(--space-3xl) var(--space-lg);
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .section-title {
            margin-bottom: var(--space-md);
        }

        .section-subtitle {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ========== Bento Grid ========== */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-lg);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .bento-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            transition: all var(--duration-normal) var(--ease-spring);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .bento-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-color);
        }

        .bento-card-large {
            grid-column: span 2;
        }

        .bento-icon {
            font-size: 40px;
            margin-bottom: var(--space-md);
        }

        .bento-title {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: var(--space-xs);
        }

        .bento-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .bento-card-blue { background: linear-gradient(135deg, #f0f4ff, #e8f0fe); }
        .bento-card-purple { background: linear-gradient(135deg, #f3e8ff, #ede9fe); }
        .bento-card-green { background: linear-gradient(135deg, #f0fdf4, #dcfce7); }
        .bento-card-orange { background: linear-gradient(135deg, #fff7ed, #ffedd5); }

        /* ========== Workflow Section ========== */
        .workflow-section {
            background: var(--bg-secondary);
        }

        .workflow-steps {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
        }

        .workflow-step {
            display: flex;
            align-items: flex-start;
            gap: var(--space-lg);
            padding: var(--space-lg);
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .step-number {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
            color: white;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .step-content h3 {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .step-content p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ========== Version Section ========== */
        .version-section {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .version-compare {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xl);
        }

        .version-card {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .version-card-featured {
            border: 2px solid var(--apple-blue);
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .version-card-featured::before {
            content: "最新";
            position: absolute;
            top: -12px;
            right: var(--space-lg);
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
            color: white;
            padding: 4px 16px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        .version-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }

        .version-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .version-date {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .version-core-features {
            margin-bottom: var(--space-lg);
        }

        .version-core-features h4 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            margin-bottom: var(--space-sm);
        }

        .feature-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
        }

        .feature-tag {
            background: var(--bg-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== Update Categories ========== */
        .update-categories {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-lg);
        }

        .update-category {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            border: 1px solid var(--border-color);
        }

        .update-category-highlight {
            border: 2px solid var(--apple-blue);
            background: linear-gradient(135deg, #f8fafc, #f0f4ff);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .category-icon-blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
        .category-icon-purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }
        .category-icon-green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
        .category-icon-orange { background: linear-gradient(135deg, #ffedd5, #fed7aa); }
        .category-icon-pink { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }

        .category-title {
            font-size: 17px;
            font-weight: 600;
        }

        .category-badge {
            background: var(--apple-red);
            color: white;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 600;
            margin-left: auto;
        }

        .category-features {
            list-style: none;
        }

        .category-features li {
            padding: 8px 0;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .category-features li:last-child {
            border-bottom: none;
        }

        .category-features li::before {
            content: "✓";
            color: var(--apple-green);
            font-weight: 600;
        }

        .category-features li.highlight {
            color: var(--text-primary);
            font-weight: 500;
        }

        .category-features li.highlight::before {
            content: "★";
            color: var(--apple-orange);
        }

        /* ========== Skills Grid ========== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-md);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .skill-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            transition: all var(--duration-fast) var(--ease-spring);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .skill-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .skill-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--space-sm);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: var(--bg-primary);
        }

        .skill-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .skill-command {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--apple-blue);
            background: rgba(0,113,227,0.1);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            display: inline-block;
            margin-bottom: var(--space-xs);
        }

        .skill-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* ========== Highlight Cards ========== */
        .highlight-section {
            background: linear-gradient(135deg, #f0f4ff, #f8fafc);
        }

        .highlight-cards {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-lg);
        }

        .highlight-card {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            border: 1px solid var(--border-color);
            display: flex;
            gap: var(--space-lg);
        }

        .highlight-icon {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        .highlight-content h3 {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: var(--space-xs);
        }

        .highlight-content p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.5;
        }

        /* ========== Code Block - Apple Style ========== */
        .code-block {
            background: #1d1d1f;
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            margin: var(--space-md) 0;
            overflow-x: auto;
        }

        .code-block code {
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            color: #f5f5f7;
        }

        .code-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: var(--space-sm);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .code-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .code-dot-red { background: #ff5f56; }
        .code-dot-yellow { background: #ffbd2e; }
        .code-dot-green { background: #27c93f; }

        /* ========== Content Styles ========== */
        .content-wrapper {
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }

        .markdown-content {
            font-size: 19px;
            line-height: 1.6;
        }

        .markdown-content h1 {
            font-size: 40px;
            font-weight: 700;
            margin: var(--space-2xl) 0 var(--space-md);
            letter-spacing: -0.003em;
        }

        .markdown-content h2 {
            font-size: 28px;
            font-weight: 600;
            margin: var(--space-xl) 0 var(--space-sm);
            letter-spacing: 0.007em;
        }

        .markdown-content h3 {
            font-size: 21px;
            font-weight: 600;
            margin: var(--space-lg) 0 var(--space-xs);
        }

        .markdown-content p {
            margin-bottom: var(--space-md);
            color: var(--text-secondary);
        }

        .markdown-content ul, .markdown-content ol {
            margin: var(--space-md) 0;
            padding-left: var(--space-lg);
        }

        .markdown-content li {
            margin-bottom: var(--space-xs);
            color: var(--text-secondary);
        }

        .markdown-content code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--apple-blue);
        }

        .markdown-content pre {
            background: #1d1d1f;
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            overflow-x: auto;
            margin: var(--space-md) 0;
        }

        .markdown-content pre code {
            background: none;
            color: #f5f5f7;
            padding: 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-md) 0;
            font-size: 16px;
        }

        .markdown-content th, .markdown-content td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .markdown-content th {
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        /* ========== Footer ========== */
        .footer {
            background: var(--bg-secondary);
            padding: var(--space-2xl) var(--space-lg);
            text-align: center;
        }

        .footer-content {
            max-width: var(--max-width);
            margin: 0 auto;

            justify-content: center;
            gap: var(--space-lg);
            margin-bottom: var(--space-md);
        }

            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color var(--duration-fast);
        }

        .footer-link:hover {
            color: var(--apple-blue);
        }

        .footer-copy {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bento-card-large {
                grid-column: span 2;
            }

            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .version-compare {
                grid-template-columns: 1fr;
            }

            .update-categories {
                grid-template-columns: 1fr;
            }

                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .typo-hero {
                font-size: 40px;
            }

            .typo-headline {
                font-size: 32px;
            }

            .typo-intro {
                font-size: 21px;
            }

            .bento-grid {
                grid-template-columns: 1fr;
            }

            .bento-card-large {
                grid-column: span 1;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .hero-cta-group {
                flex-direction: column;
                align-items: center;
            }

            .nav-links {
                display: none;
            }
        }

        /* ========== Transitions ========== */
        .fade-enter-active, .fade-leave-active {
            transition: opacity var(--duration-normal) var(--ease-out);
        }

        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }

        .slide-up-enter-active, .slide-up-leave-active {
            transition: all var(--duration-normal) var(--ease-spring);
        }

        .slide-up-enter-from, .slide-up-leave-to {
            opacity: 0;
            transform: translateY(20px);
        }

        /* ========== Modal Styles ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            max-width: 560px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            padding: var(--space-xl);
            box-shadow: var(--shadow-xl);
        }

        .modal-close {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            width: 32px;
            height: 32px;

            background: var(--bg-secondary);

            align-items: center;

        }

        .modal-close:hover {

        .modal-header {

        .modal-icon {

- 访问 GitHub 查看完整文档：github.com/K3tty5555/AI_PM`;

        // Skill Usage Data
        const SKILL_USAGE = {
            "/ai-pm": "/ai-pm \"你的产品想法\"",
            "/pm-analyze": "/pm-analyze [--file=需求文件路径]",
            "/pm-research": "/pm-research \"竞品类型\" [--depth=basic|standard|deep]",
            "/pm-prd": "/pm-prd [--style=风格] [--template=模板]",
            "/pm-prototype": "/pm-prototype [--platform=web|mobile] [--prd=PRD文件路径]",
            "/pm-review": "/pm-review [--roles=角色列表]",
            "/pm-story": "/pm-story",
            "/pm-analytics": "/pm-analytics [--prd=PRD文件路径] [--focus=关注点]",
            "/pm-data": "/pm-data --file=数据文件路径 [--format=csv|json|excel]",
            "/pm-config": "/pm-config [get|set|list] [配置项] [值]",
            "/pm-dashboard": "/pm-dashboard",
            "/agent-team": "/agent-team \"需求描述\" [--mode=serial|parallel|agile] [--roles=角色列表]",
            "/pm-knowledge": "/pm-knowledge [search|add|suggest] [关键词]",
            "/pm-ui-spec": "/pm-ui-spec [list|upload|apply] [规范名]",
            "/pm-writing-style": "/pm-writing-style [list|analyze|apply] [风格名]"
        };

        createApp({
            setup() {
                const currentView = ref('home');
                const skills = ref(SKILLS_DATA.map(s => ({...s, usage: SKILL_USAGE[s.command]})));
                const selectedSkill = ref(null);

                const renderedGuide = computed(() => {
                    return marked.parse(GUIDE_CONTENT);
                });

                const openSkillModal = (skill) => {
                    selectedSkill.value = skill;
                    document.body.style.overflow = 'hidden';
                };

                const closeSkillModal = () => {
                    selectedSkill.value = null;
                    document.body.style.overflow = '';
                };

                onMounted(() => {
                    // Highlight code blocks
                    document.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                });

                return {
                    currentView,
                    skills,
                    selectedSkill,
                    renderedGuide,
                    openSkillModal,
                    closeSkillModal
                };
            }
        }).mount('#app');
    </script>
</body>
