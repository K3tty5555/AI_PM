<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PM · 使用教程</title>
<style>
:root {
  color-scheme: light dark;
  --accent: #1D4ED8;
  --accent-hover: #1E40AF;
  --accent-light: rgba(29,78,216,0.08);
  --accent-ring: rgba(29,78,216,0.25);

  --background: #F8FAFF;
  --bg-elevated: rgba(234,241,252,0.90);
  --secondary: #EEF2FB;
  --card: #FFFFFF;

  --text-primary: #0F172A;
  --text-secondary: #64748B;
  --text-tertiary: #94A3B8;

  --success: #16A34A;
  --warning: #F59E0B;
  --border: rgba(0,0,0,0.08);
  --hover-bg: rgba(0,0,0,0.04);
  --active-bg: rgba(0,0,0,0.07);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);

  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-decelerate: cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 100ms;
  --dur-base: 200ms;
  --dur-slow: 300ms;

  --radius-sm: 6px;
  --radius: 8px;
  --radius-lg: 12px;

  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

html.theme-dark {
  --accent: #4F8EF7;
  --accent-hover: #3B7AE0;
  --accent-light: rgba(79,142,247,0.10);
  --background: oklch(12% 0.02 250);
  --bg-elevated: oklch(14% 0.025 250);
  --secondary: oklch(18% 0.03 250);
  --card: oklch(16% 0.025 250);
  --text-primary: #E2E8F0;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --border: rgba(255,255,255,0.07);
  --hover-bg: rgba(255,255,255,0.05);
  --active-bg: rgba(255,255,255,0.08);

  --accent-ring: rgba(79,142,247,0.30);

  --success: #4ADE80;
  --warning: #FBBF24;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.30);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.40);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.50);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.60);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; transition: background-color 200ms ease, color 200ms ease; }
body {
  font-family: var(--font-sans);
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes staggerFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInLeft {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-ring); }
  50%      { transform: scale(1.15); box-shadow: 0 0 0 4px transparent; }
}
@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  /* TODO Task 9/10: also explicitly cover html { transition / scroll-behavior } */
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* 组件样式占位，后续 Task 逐步填充 */

.app-header {
  position: sticky; top: 0; z-index: 50;
  height: 44px;
  background: var(--bg-elevated);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 32px;
}
.app-logo {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary); text-decoration: none;
}
.app-nav { display: flex; gap: 4px; flex: 1; }
.app-nav-link {
  position: relative;
  font-size: 13px; font-weight: 500;
  color: var(--text-secondary);
  padding: 0 12px; height: 44px;
  display: flex; align-items: center;
  text-decoration: none;
  transition: color var(--dur-base) var(--ease-standard);
}
.app-nav-link:hover { color: var(--text-primary); }
.app-nav-link.active { color: var(--text-primary); }
.app-nav-link::after {
  content: ''; position: absolute;
  bottom: 0; left: 8px; right: 8px; height: 2px;
  background: var(--accent);
  transform: scaleX(0); transform-origin: left;
  transition: transform var(--dur-base) var(--ease-decelerate);
}
.app-nav-link.active::after { transform: scaleX(1); }
.app-actions { display: flex; gap: 8px; align-items: center; }
.theme-toggle, .icon-link {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: none; background: transparent;
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background var(--dur-base) var(--ease-standard), color var(--dur-base);
}
.theme-toggle:hover, .icon-link:hover {
  background: var(--hover-bg);
  color: var(--text-primary);
}
.theme-toggle:active { transform: scale(0.97); transition-duration: var(--dur-fast); }
.theme-toggle svg, .icon-link svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none;
  stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
}
.theme-toggle .icon-moon { display: none; }
html.theme-dark .theme-toggle .icon-sun { display: none; }
html.theme-dark .theme-toggle .icon-moon { display: block; }
.app-nav-link:focus-visible,
.theme-toggle:focus-visible,
.icon-link:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

.hero {
  min-height: calc(100vh - 44px);
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: center;
  padding: 80px 64px;
  max-width: 1280px; margin: 0 auto;
}
.hero-content { animation: fadeInUp var(--dur-slow) var(--ease-decelerate); }
.hero-eyebrow {
  font-size: 13px; font-weight: 500;
  color: var(--accent);
  margin-bottom: 16px;
}
.hero h1 {
  font-size: 56px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
}
.hero-sub {
  font-size: 16px; font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 32px;
  max-width: 480px;
}
.hero-cta {
  display: flex; gap: 12px;
}
.btn-primary, .btn-ghost {
  display: inline-flex; align-items: center; gap: 6px;
  height: 42px; padding: 0 20px;
  border-radius: var(--radius);
  font-size: 14px; font-weight: 500;
  border: none; cursor: pointer;
  text-decoration: none;
  transition: background var(--dur-base) var(--ease-standard), transform var(--dur-fast);
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.97); }
.btn-ghost {
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--hover-bg); border-color: var(--accent); }
.btn-ghost:active { transform: scale(0.97); }

/* Mockup 三栏示意图 */
.hero-mockup {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  display: grid;
  grid-template-rows: 32px 1fr;
  height: 360px;
  transition: transform var(--dur-base) var(--ease-standard), box-shadow var(--dur-base);
  animation: fadeInUp var(--dur-slow) var(--ease-decelerate) 100ms backwards;
}
.hero-mockup:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.mockup-titlebar {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  background: var(--secondary);
  border-bottom: 1px solid var(--border);
}
.mockup-titlebar-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}
.mockup-titlebar-dot.red { background: #FF5F57; }
.mockup-titlebar-dot.yellow { background: #FEBC2E; }
.mockup-titlebar-dot.green { background: #28C840; }
.mockup-titlebar-title {
  margin-left: 12px;
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary);
}
.mockup-body {
  display: grid;
  grid-template-columns: 140px 1fr;
}
.mockup-sidebar {
  background: var(--bg-elevated);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.mockup-project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px;
  margin-bottom: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.mockup-line {
  height: 6px; border-radius: 3px;
  background: var(--secondary);
}
.mockup-line.short { width: 50%; }
.mockup-line.med { width: 70%; }
.mockup-line.full { width: 100%; }
.mockup-stage {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  color: var(--text-tertiary);
  position: relative;
}
.mockup-stage.current {
  background: var(--active-bg);
  color: var(--text-primary);
  font-weight: 500;
}
.mockup-stage.current::before {
  content: ''; position: absolute;
  left: -12px; top: 4px; bottom: 4px;
  width: 3px; background: var(--accent);
  border-radius: 2px;
}
.mockup-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.mockup-dot.pending {
  border: 1.25px solid var(--text-tertiary);
  background: transparent;
}
.mockup-dot.current {
  background: var(--accent);
  animation: dotPulse 2.5s ease-in-out infinite;
}
.mockup-dot.completed {
  background: var(--success);
}
.mockup-main {
  padding: 20px;
  background: var(--background);
  display: flex; flex-direction: column; gap: 12px;
}
.mockup-main-title {
  height: 14px; width: 60%;
  background: var(--text-secondary);
  opacity: 0.6;
  border-radius: 3px;
}
.mockup-main-btn {
  height: 26px; width: 80px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  margin-top: 8px;
}

/* 响应式：≤ 900px hero 堆叠 */
@media (max-width: 900px) {
  .hero {
    grid-template-columns: 1fr;
    padding: 48px 24px;
    gap: 48px;
  }
  .hero h1 { font-size: 40px; }
  .hero-mockup { height: 280px; }
}

</style>
</head>
