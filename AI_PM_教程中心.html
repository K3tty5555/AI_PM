<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI_PM - AI 产品经理</title>
    <meta name="description" content="AI_PM 是一套 AI 辅助产品管理工具集，将简短需求转化为完整的产品方案">

    <!-- Apple-style Meta -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Marked.js -->
    <script src="https://unpkg.com/marked@9/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11/styles/github.min.css">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11/highlight.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11/languages/bash.min.js"></script>

    <style>
        /* ========== Apple Design System ========== */
        :root {
            /* Apple Color Palette */
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-indigo: #5856d6;
            --apple-purple: #af52de;
            --apple-pink: #ff2d55;
            --apple-red: #ff3b30;
            --apple-orange: #ff9500;
            --apple-yellow: #ffcc00;
            --apple-green: #34c759;
            --apple-teal: #5ac8fa;
            --apple-cyan: #32ade6;

            /* Grays - Apple Style */
            --gray-01: #f5f5f7;
            --gray-02: #e8e8ed;
            --gray-03: #d2d2d7;
            --gray-04: #86868b;
            --gray-05: #6e6e73;
            --gray-06: #1d1d1f;

            /* Semantic Colors */
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #fafafa;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #6e6e73;
            --border-color: rgba(0,0,0,0.1);

            /* Typography - Apple SF Pro style */
            --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-mono: 'SF Mono', SFMono-Regular, 'Courier New', monospace;

            /* Spacing - Apple 8pt grid */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            --space-2xl: 64px;
            --space-3xl: 96px;

            /* Border Radius - Apple style */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 28px;
            --radius-full: 9999px;

            /* Shadows - Apple depth */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --shadow-xl: 0 24px 64px rgba(0,0,0,0.16);

            /* Layout */
            --nav-height: 52px;
            --max-width: 1024px;
            --content-width: 692px;

            /* Animation */
            --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 0.2s;
            --duration-normal: 0.4s;
            --duration-slow: 0.6s;
        }

        /* Dark Mode - Apple style */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --bg-secondary: #1c1c1e;
                --bg-tertiary: #2c2c2e;
                --text-primary: #f5f5f7;
                --text-secondary: #86868b;
                --text-tertiary: #6e6e73;
                --border-color: rgba(255,255,255,0.1);
                --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
                --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
                --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
            }
        }

        /* ========== Reset & Base ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            overflow-x: hidden;
        }

        /* ========== Typography - Apple Style ========== */
        .typo-hero {
            font-size: 64px;
            font-weight: 700;
            line-height: 1.0625;
            letter-spacing: -0.009em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--apple-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .typo-eyebrow {
            font-size: 21px;
            font-weight: 600;
            line-height: 1.19048;
            letter-spacing: 0.011em;
            color: var(--apple-blue);
            text-transform: uppercase;
        }

        .typo-headline {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.08349;
            letter-spacing: -0.003em;
        }

        .typo-intro {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.14286;
            letter-spacing: 0.007em;
        }

        .typo-body {
            font-size: 21px;
            font-weight: 400;
            line-height: 1.381;
            letter-spacing: 0.011em;
            color: var(--text-secondary);
        }

        .typo-caption {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.28577;
            letter-spacing: -0.016em;
            color: var(--text-tertiary);
        }

        /* ========== Navigation - Apple Style ========== */
        .nav-global {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(255,255,255,0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 9999;
            transition: background var(--duration-fast) var(--ease-out);
        }

        @media (prefers-color-scheme: dark) {
            .nav-global {
                background: rgba(0,0,0,0.72);
            }
        }

        .nav-content {
            max-width: var(--max-width);
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-lg);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 21px;
            letter-spacing: -0.021em;
            transition: opacity var(--duration-fast) var(--ease-out);
        }

        .nav-logo:hover {
            opacity: 0.8;
        }

        .nav-logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 13px;
        }

        .nav-links {
            display: flex;
            gap: var(--space-md);
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-primary);
            text-decoration: none;
            opacity: 0.8;
            transition: opacity var(--duration-fast) var(--ease-out);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }

        .nav-link:hover {
            opacity: 1;
        }

        .nav-link.active {
            opacity: 1;
            background: var(--bg-secondary);
        }

        .nav-cta {
            background: var(--apple-blue);
            color: white;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .nav-cta:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.02);
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: all var(--duration-fast) var(--ease-out);
        }

        .theme-toggle:hover {
            background: var(--bg-secondary);
        }

        /* ========== Hero Section - Apple Style ========== */
        .section-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: calc(var(--nav-height) + var(--space-3xl)) var(--space-lg) var(--space-3xl);
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            max-width: 800px;
            z-index: 1;
        }

        .hero-eyebrow {
            margin-bottom: var(--space-md);
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) forwards;
        }

        .hero-title {
            margin-bottom: var(--space-md);
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.1s forwards;
        }

        .hero-description {
            max-width: 600px;
            margin: 0 auto var(--space-xl);
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.2s forwards;
        }

        .hero-cta-group {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.3s forwards;
        }

        .btn-primary {
            background: var(--apple-blue);
            color: white;
            padding: 18px 32px;
            border-radius: var(--radius-full);
            font-size: 17px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all var(--duration-fast) var(--ease-spring);
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.04);
        }

        .btn-secondary {
            background: transparent;
            color: var(--apple-blue);
            padding: 18px 32px;
            border-radius: var(--radius-full);
            font-size: 17px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--apple-blue);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-spring);
        }

        .btn-secondary:hover {
            background: var(--apple-blue);
            color: white;
        }

        /* Animated Background Elements */
        .hero-bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--apple-blue);
            top: 10%;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--apple-purple);
            top: 40%;
            right: -50px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: var(--apple-cyan);
            bottom: 20%;
            left: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== Section Styles ========== */
        .section {
            padding: var(--space-3xl) var(--space-lg);
        }

        .section-header {
            text-align: center;
            max-width: var(--content-width);
            margin: 0 auto var(--space-2xl);
        }

        .section-title {
            margin-bottom: var(--space-sm);
        }

        .section-subtitle {
            color: var(--text-secondary);
        }

        /* ========== Bento Grid - Apple Style ========== */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-lg);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .bento-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            position: relative;
            overflow: hidden;
            transition: transform var(--duration-normal) var(--ease-spring), box-shadow var(--duration-normal) var(--ease-out);
            cursor: pointer;
        }

        .bento-card:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        .bento-card-large {
            grid-column: span 2;
        }

        .bento-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: var(--space-md);
        }

        .bento-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: var(--space-xs);
        }

        .bento-desc {
            font-size: 17px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .bento-card-blue { background: linear-gradient(135deg, #e3f2ff 0%, #f0f7ff 100%); }
        .bento-card-purple { background: linear-gradient(135deg, #f3e8ff 0%, #faf5ff 100%); }
        .bento-card-green { background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f4 100%); }
        .bento-card-orange { background: linear-gradient(135deg, #fff3e0 0%, #fff8f0 100%); }

        @media (prefers-color-scheme: dark) {
            .bento-card-blue { background: linear-gradient(135deg, #0d2137 0%, #1a3366 100%); }
            .bento-card-purple { background: linear-gradient(135deg, #2d1b4e 0%, #3d2b6e 100%); }
            .bento-card-green { background: linear-gradient(135deg, #0d3320 0%, #1a4d33 100%); }
            .bento-card-orange { background: linear-gradient(135deg, #3d260d 0%, #5c3d1a 100%); }
        }

        /* ========== Workflow Section ========== */
        .workflow-section {
            background: var(--bg-secondary);
        }

        .workflow-steps {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
        }

        .workflow-step {
            display: flex;
            align-items: flex-start;
            gap: var(--space-md);
            padding: var(--space-lg);
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            transition: transform var(--duration-fast) var(--ease-out);
        }

        .workflow-step:hover {
            transform: translateX(8px);
        }

        .step-number {
            width: 40px;
            height: 40px;
            background: var(--apple-blue);
            color: white;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 17px;
            flex-shrink: 0;
        }

        .step-content h3 {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .step-content p {
            color: var(--text-secondary);
            font-size: 17px;
        }

        /* ========== Skills Grid ========== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .skill-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            transition: all var(--duration-fast) var(--ease-spring);
            border: 1px solid transparent;
        }

        .skill-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .skill-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--space-sm);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: var(--bg-primary);
        }

        .skill-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .skill-command {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--apple-blue);
            background: rgba(0,113,227,0.1);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            display: inline-block;
            margin-bottom: var(--space-xs);
        }

        .skill-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* ========== Code Block - Apple Style ========== */
        .code-block {
            background: #1d1d1f;
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            margin: var(--space-md) 0;
            overflow-x: auto;
        }

        .code-block code {
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            color: #f5f5f7;
        }

        .code-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: var(--space-sm);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .code-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .code-dot-red { background: #ff5f56; }
        .code-dot-yellow { background: #ffbd2e; }
        .code-dot-green { background: #27c93f; }

        /* ========== Content Styles ========== */
        .content-wrapper {
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }

        .markdown-content {
            font-size: 19px;
            line-height: 1.6;
        }

        .markdown-content h1 {
            font-size: 40px;
            font-weight: 700;
            margin: var(--space-2xl) 0 var(--space-md);
            letter-spacing: -0.003em;
        }

        .markdown-content h2 {
            font-size: 28px;
            font-weight: 600;
            margin: var(--space-xl) 0 var(--space-sm);
            letter-spacing: 0.007em;
        }

        .markdown-content h3 {
            font-size: 21px;
            font-weight: 600;
            margin: var(--space-lg) 0 var(--space-xs);
        }

        .markdown-content p {
            margin-bottom: var(--space-md);
            color: var(--text-secondary);
        }

        .markdown-content ul, .markdown-content ol {
            margin: var(--space-md) 0;
            padding-left: var(--space-lg);
        }

        .markdown-content li {
            margin-bottom: var(--space-xs);
            color: var(--text-secondary);
        }

        .markdown-content code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--apple-blue);
        }

        .markdown-content pre {
            background: #1d1d1f;
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            overflow-x: auto;
            margin: var(--space-md) 0;
        }

        .markdown-content pre code {
            background: none;
            color: #f5f5f7;
            padding: 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-md) 0;
            font-size: 16px;
        }

        .markdown-content th, .markdown-content td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .markdown-content th {
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        /* ========== Footer ========== */
        .footer {
            background: var(--bg-secondary);
            padding: var(--space-2xl) var(--space-lg);
            text-align: center;
        }

        .footer-content {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: var(--space-lg);
            margin-bottom: var(--space-md);
        }

        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color var(--duration-fast);
        }

        .footer-link:hover {
            color: var(--apple-blue);
        }

        .footer-copy {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .typo-hero {
                font-size: 40px;
            }

            .typo-headline {
                font-size: 32px;
            }

            .typo-intro {
                font-size: 21px;
            }

            .bento-grid {
                grid-template-columns: 1fr;
            }

            .bento-card-large {
                grid-column: span 1;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .hero-cta-group {
                flex-direction: column;
                align-items: center;
            }

            .nav-links {
                display: none;
            }
        }

        /* ========== Transitions ========== */
        .fade-enter-active, .fade-leave-active {
            transition: opacity var(--duration-normal) var(--ease-out);
        }

        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }

        .slide-up-enter-active, .slide-up-leave-active {
            transition: all var(--duration-normal) var(--ease-spring);
        }

        .slide-up-enter-from, .slide-up-leave-to {
            opacity: 0;
            transform: translateY(20px);
        }

        /* ========== Modal Styles ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            max-width: 560px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            padding: var(--space-xl);
            box-shadow: var(--shadow-xl);
        }

        .modal-close {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-secondary);
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--duration-fast);
        }

        .modal-close:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .modal-header {
            text-align: center;
            margin-bottom: var(--space-lg);
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-md);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: var(--bg-secondary);
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: var(--space-xs);
        }

        .modal-command {
            font-family: var(--font-mono);
            font-size: 16px;
            color: var(--apple-blue);
            background: rgba(0,113,227,0.1);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            display: inline-block;
        }

        .modal-body {
            color: var(--text-secondary);
        }

        .modal-desc {
            font-size: 17px;
            margin-bottom: var(--space-lg);
            text-align: center;
        }

        .modal-usage h4 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: var(--space-sm);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="nav-global">
            <div class="nav-content">
                <a href="#" class="nav-logo" @click.prevent="currentView = 'home'">
                    <div class="nav-logo-icon">AI</div>
                    <span>AI_PM</span>
                </a>
                <div class="nav-links">
                    <a href="#" class="nav-link" :class="{ active: currentView === 'home' }" @click.prevent="currentView = 'home'">首页</a>
                    <a href="#" class="nav-link" :class="{ active: currentView === 'guide' }" @click.prevent="currentView = 'guide'">指南</a>
                    <a href="#" class="nav-link" :class="{ active: currentView === 'skills' }" @click.prevent="currentView = 'skills'">技能</a>
                    <a href="https://github.com/K3tty5555/AI_PM" target="_blank" class="nav-link">GitHub</a>
                </div>
                <button class="theme-toggle" @click="toggleTheme" :title="isDarkMode ? '切换到亮色模式' : '切换到暗色模式'">
                    <svg v-if="!isDarkMode" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                    <svg v-else width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M2 12h2M20 12h2"></path>
                    </svg>
                </button>
                <a href="#" class="nav-cta" @click.prevent="currentView = 'guide'">开始使用</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main>
            <!-- Home View -->
            <template v-if="currentView === 'home'">
                <!-- Hero Section -->
                <section class="section-hero">
                    <div class="hero-bg-shapes">
                        <div class="shape shape-1"></div>
                        <div class="shape shape-2"></div>
                        <div class="shape shape-3"></div>
                    </div>
                    <div class="hero-content">
                        <div class="hero-eyebrow typo-eyebrow">AI 辅助产品管理</div>
                        <h1 class="hero-title typo-hero">AI产品助手</h1>
                        <p class="hero-description typo-body">
                            AI_PM 是一套专业的产品管理工具集。只需描述你的想法，AI 将引导你完成需求分析、竞品研究、PRD 编写、原型设计全流程。
                        </p>
                        <div class="hero-cta-group">
                            <a href="#" class="btn-primary" @click.prevent="currentView = 'guide'">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                                开始体验
                            </a>
                            <a href="#" class="btn-secondary" @click.prevent="currentView = 'skills'">
                                浏览技能
                            </a>
                        </div>
                    </div>
                </section>

                <!-- Features Bento Grid -->
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title typo-headline">从想法到产品<br>只需 4 步</h2>
                    </div>
                    <div class="bento-grid">
                        <div class="bento-card bento-card-blue" @click="currentView = 'guide'">
                            <div class="bento-icon">💬</div>
                            <h3 class="bento-title">需求分析</h3>
                            <p class="bento-desc">AI 通过深度访谈澄清需求，输出结构化分析报告和用户画像</p>
                        </div>
                        <div class="bento-card bento-card-purple" @click="currentView = 'guide'">
                            <div class="bento-icon">🔍</div>
                            <h3 class="bento-title">竞品研究</h3>
                            <p class="bento-desc">自动分析市场竞争格局，识别差异化机会和突破口</p>
                        </div>
                        <div class="bento-card bento-card-green bento-card-large" @click="currentView = 'guide'">
                            <div class="bento-icon">📝</div>
                            <h3 class="bento-title">PRD 生成</h3>
                            <p class="bento-desc">输出专业级产品需求文档，支持自定义写作风格和模板。包含修订记录、需求分析、功能清单、流程图、详细设计等完整章节。</p>
                        </div>
                        <div class="bento-card bento-card-orange bento-card-large" @click="currentView = 'guide'">
                            <div class="bento-icon">🎨</div>
                            <h3 class="bento-title">原型设计</h3>
                            <p class="bento-desc">基于 PRD 自动生成可交互网页原型，支持 Web、移动端。包含完整前端代码实现，可直接预览和分享。</p>
                        </div>
                    </div>
                </section>

                <!-- Workflow Section -->
                <section class="section workflow-section">
                    <div class="section-header">
                        <h2 class="section-title typo-headline">简单的工作流程</h2>
                        <p class="section-subtitle typo-body">只需一条命令，开启 AI 产品之旅</p>
                    </div>
                    <div class="workflow-steps">
                        <div class="workflow-step">
                            <div class="step-number">1</div>
                            <div class="step-content">
                                <h3>启动 AI_PM</h3>
                                <p>在 Claude Code 中输入 /ai-pm "你的产品想法"</p>
                            </div>
                        </div>
                        <div class="workflow-step">
                            <div class="step-number">2</div>
                            <div class="step-content">
                                <h3>跟随引导</h3>
                                <p>AI 会问你几个关键问题，帮助澄清需求</p>
                            </div>
                        </div>
                        <div class="workflow-step">
                            <div class="step-number">3</div>
                            <div class="step-content">
                                <h3>自动分析</h3>
                                <p>AI 自动完成需求分析、竞品研究、PRD 编写</p>
                            </div>
                        </div>
                        <div class="workflow-step">
                            <div class="step-number">4</div>
                            <div class="step-content">
                                <h3>获取产出</h3>
                                <p>获得完整的 PRD 文档和可交互原型</p>
                            </div>
                        </div>
                    </div>
                </section>
            </template>

            <!-- Skills View -->
            <template v-if="currentView === 'skills'">
                <section class="section" style="padding-top: calc(var(--nav-height) + var(--space-3xl));">
                    <div class="section-header">
                        <h2 class="section-title typo-headline">12 个专业技能</h2>
                        <p class="section-subtitle typo-body">覆盖产品管理的完整工作流程</p>
                    </div>
                    <div class="skills-grid">
                        <div v-for="skill in skills" :key="skill.name" class="skill-card" @click="openSkillModal(skill)">
                            <div class="skill-icon">{{ skill.icon }}</div>
                            <div class="skill-name">{{ skill.name }}</div>
                            <div class="skill-command">{{ skill.command }}</div>
                            <div class="skill-desc">{{ skill.desc }}</div>
                        </div>
                    </div>
                </section>
            </template>

            <!-- Guide View -->
            <template v-if="currentView === 'guide'">
                <section class="section" style="padding-top: calc(var(--nav-height) + var(--space-3xl));">
                    <div class="content-wrapper">
                        <div class="markdown-content" v-html="renderedGuide"></div>
                    </div>
                </section>
            </template>

            <!-- Skill Detail Modal -->
            <div v-if="selectedSkill" class="modal-overlay" @click.self="closeSkillModal">
                <div class="modal-content">
                    <button class="modal-close" @click="closeSkillModal">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6 6 18M6 6l12 12"/>
                        </svg>
                    </button>
                    <div class="modal-header">
                        <div class="modal-icon">{{ selectedSkill.icon }}</div>
                        <h2 class="modal-title">{{ selectedSkill.name }}</h2>
                        <div class="modal-command">{{ selectedSkill.command }}</div>
                    </div>
                    <div class="modal-body">
                        <p class="modal-desc">{{ selectedSkill.desc }}</p>
                        <div class="modal-usage">
                            <h4>使用方法</h4>
                            <div class="code-block">
                                <div class="code-header">
                                    <div class="code-dot code-dot-red"></div>
                                    <div class="code-dot code-dot-yellow"></div>
                                    <div class="code-dot code-dot-green"></div>
                                </div>
                                <code>{{ selectedSkill.usage || selectedSkill.command }}</code>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="https://github.com/K3tty5555/AI_PM" target="_blank" class="footer-link">GitHub</a>
                    <a href="#" class="footer-link" @click.prevent="currentView = 'guide'">文档</a>
                    <a href="#" class="footer-link" @click.prevent="currentView = 'skills'">技能</a>
                </div>
                <p class="footer-copy">© 2025 AI_PM. 基于 MIT 协议开源。</p>
            </div>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        // Skills Data
        const SKILLS_DATA = [
            { name: "AI_PM 主控", command: "/ai-pm", icon: "🎯", desc: "完整产品流程，从需求到原型" },
            { name: "需求分析", command: "/pm-analyze", icon: "💬", desc: "深度访谈澄清需求" },
            { name: "竞品研究", command: "/pm-research", icon: "🔍", desc: "分析市场竞争格局" },
            { name: "PRD 生成", command: "/pm-prd", icon: "📝", desc: "输出专业需求文档" },
            { name: "原型设计", command: "/pm-prototype", icon: "🎨", desc: "生成交互式网页原型" },
            { name: "需求评审", command: "/pm-review", icon: "👥", desc: "多角色专业评审" },
            { name: "用户故事", command: "/pm-story", icon: "📖", desc: "编写用户故事和用例" },
            { name: "数据分析", command: "/pm-analytics", icon: "📊", desc: "指标体系和埋点设计" },
            { name: "数据洞察", command: "/pm-data", icon: "💡", desc: "从数据中发现洞察" },
            { name: "配置管理", command: "/pm-config", icon: "⚙️", desc: "写作风格和 UI 规范" },
            { name: "项目仪表盘", command: "/pm-dashboard", icon: "📈", desc: "可视化进度追踪" },
            { name: "代理团队", command: "/agent-team", icon: "🤖", desc: "多角色协同工作" }
        ];

        // Guide Content
        const GUIDE_CONTENT = `# 快速开始

## 安装

AI_PM 是一套 Claude Code 技能套件，无需复杂安装。

### 1. 克隆项目

\`\`\`bash
git clone https://github.com/K3tty5555/AI_PM.git
cd AI_PM
\`\`\`

### 2. 配置 Claude Code 技能

\`\`\`bash
mkdir -p ~/.claude/skills
cp -r .claude/skills/* ~/.claude/skills/
\`\`\`

### 3. 启动 Claude Code

\`\`\`bash
claude
\`\`\`

## 你的第一个项目

只需一条命令，AI 将引导你完成整个过程：

\`\`\`
/ai-pm "我想做一个记账小程序，帮助年轻人管理日常开支"
\`\`\`

AI 会问你几个关键问题：
- 目标用户是谁？
- 核心功能有哪些？
- 和竞品有什么区别？

然后自动完成：
1. 需求分析 - 输出用户画像和痛点分析
2. 竞品研究 - 分析市场竞争格局
3. PRD 编写 - 生成专业产品需求文档
4. 原型设计 - 创建可交互网页原型

## 技能速查

| 技能 | 命令 | 用途 |
|------|------|------|
| 需求分析 | /pm-analyze | 深度访谈澄清需求 |
| PRD 生成 | /pm-prd | 输出专业需求文档 |
| 原型设计 | /pm-prototype | 生成交互式原型 |
| 需求评审 | /pm-review | 多角色专业评审 |

## 工作流程

\`\`\`
需求输入 → 需求分析 → 竞品研究 → PRD 生成 → 原型设计 → 需求评审
\`\`\`

每一步都有 AI 引导，你也可以随时干预和修改。

## 获取帮助

- 在 Claude Code 中输入 "/ai-pm --help" 查看所有命令
- 访问 GitHub 查看完整文档：github.com/K3tty5555/AI_PM`;

        // Skill Usage Data
        const SKILL_USAGE = {
            "/ai-pm": "/ai-pm \"你的产品想法\"",
            "/pm-analyze": "/pm-analyze [--file=需求文件路径]",
            "/pm-research": "/pm-research \"竞品类型\" [--depth=basic|standard|deep]",
            "/pm-prd": "/pm-prd [--style=风格] [--template=模板]",
            "/pm-prototype": "/pm-prototype [--platform=web|mobile] [--prd=PRD文件路径]",
            "/pm-review": "/pm-review [--roles=角色列表]",
            "/pm-story": "/pm-story",
            "/pm-analytics": "/pm-analytics [--prd=PRD文件路径] [--focus=关注点]",
            "/pm-data": "/pm-data --file=数据文件路径 [--format=csv|json|excel]",
            "/pm-config": "/pm-config [get|set|list] [配置项] [值]",
            "/pm-dashboard": "/pm-dashboard",
            "/agent-team": "/agent-team \"需求描述\" [--mode=serial|parallel|agile] [--roles=角色列表]"
        };

        createApp({
            setup() {
                const currentView = ref('home');
                const skills = ref(SKILLS_DATA.map(s => ({...s, usage: SKILL_USAGE[s.command]})));
                const selectedSkill = ref(null);
                const isDarkMode = ref(false);

                const renderedGuide = computed(() => {
                    return marked.parse(GUIDE_CONTENT);
                });

                const openSkillModal = (skill) => {
                    selectedSkill.value = skill;
                    document.body.style.overflow = 'hidden';
                };

                const closeSkillModal = () => {
                    selectedSkill.value = null;
                    document.body.style.overflow = '';
                };

                const toggleTheme = () => {
                    isDarkMode.value = !isDarkMode.value;
                    if (isDarkMode.value) {
                        document.documentElement.style.setProperty('--bg-primary', '#000000');
                        document.documentElement.style.setProperty('--bg-secondary', '#1c1c1e');
                        document.documentElement.style.setProperty('--bg-tertiary', '#2c2c2e');
                        document.documentElement.style.setProperty('--text-primary', '#f5f5f7');
                        document.documentElement.style.setProperty('--text-secondary', '#86868b');
                        document.documentElement.style.setProperty('--text-tertiary', '#6e6e73');
                        document.documentElement.style.setProperty('--border-color', 'rgba(255,255,255,0.1)');
                    } else {
                        document.documentElement.style.setProperty('--bg-primary', '#ffffff');
                        document.documentElement.style.setProperty('--bg-secondary', '#f5f5f7');
                        document.documentElement.style.setProperty('--bg-tertiary', '#fafafa');
                        document.documentElement.style.setProperty('--text-primary', '#1d1d1f');
                        document.documentElement.style.setProperty('--text-secondary', '#86868b');
                        document.documentElement.style.setProperty('--text-tertiary', '#6e6e73');
                        document.documentElement.style.setProperty('--border-color', 'rgba(0,0,0,0.1)');
                    }
                };

                onMounted(() => {
                    // Highlight code blocks
                    document.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                });

                return {
                    currentView,
                    skills,
                    selectedSkill,
                    isDarkMode,
                    renderedGuide,
                    openSkillModal,
                    closeSkillModal,
                    toggleTheme
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
